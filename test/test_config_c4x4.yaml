# Minimal test config: Product Group C_4 x C_4
data:
  group_name: cnxcn
  p1: 4
  p2: 4
  k: 2
  batch_size: 2
  seed: 42
  template_type: custom_fourier
  powers: [0.0, 100.0, 50.0, 25.0, 10.0, 5.0, 2.0, 1.0, 0.5, 0.25, 0.1, 0.05, 0.02, 0.01, 0.005, 0.001]
  mode: sampled
  num_samples: 5

model:
  model_type: TwoLayerMLP
  nonlinearity: power
  hidden_dim: 10
  init_scale: 0.01
  return_all_outputs: false

training:
  mode: offline
  epochs: 2
  num_steps: 2
  optimizer: adam
  learning_rate: 0.001
  betas: [0.9, 0.999]
  weight_decay: 0.0
  degree: null
  scaling_factor: -3
  grad_clip: 0.1
  verbose_interval: 1
  save_param_interval: null
  reduction_threshold: null

device: cpu

analysis:
  checkpoints: [0.0, 1.0]
